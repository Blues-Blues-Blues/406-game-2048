<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>406 · 传奇教室</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', system-ui, sans-serif;
      padding: 16px;
      margin: 0;
    }

    .game-container {
      max-width: 560px;
      width: 100%;
      background: rgba(20, 25, 35, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 36px;
      padding: 24px 20px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 1px 4px rgba(210, 230, 255, 0.3);
      border: 1px solid #3a506e;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding: 0 6px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 4px;
      color: #e1e9f5;
      text-shadow: 4px 4px 0 #0f1a2b;
      word-break: keep-all;
    }

    .scores {
      display: flex;
      gap: 12px;
    }

    .score-box {
      background: #1f2c3c;
      padding: 8px 16px;
      border-radius: 48px;
      box-shadow: inset 0 3px 6px #0a111a, 0 6px 0 #0a111a;
      color: #d9e6ff;
      text-align: center;
      min-width: 90px;
      border-bottom: 2px solid #4f7da3;
    }

    .score-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.9;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .teacher-note {
      background: #1e2f40;
      border-radius: 40px;
      padding: 8px 16px;
      margin: 10px 6px 16px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 500;
      color: #bdd4fe;
      border: 1px dashed #5f7faf;
      box-shadow: inset 0 1px 4px #2a4058;
      letter-spacing: 0.5px;
    }

    .board-container {
      position: relative;
      background: #1a2532;
      padding: 14px;
      border-radius: 28px;
      box-shadow: inset 0 6px 8px #0d151f, 0 12px 0 #0b1219, 0 6px 12px rgba(0,0,0,0.4);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      aspect-ratio: 1 / 1;
    }

    .cell {
      background: #2f4055;
      border-radius: 18px;
      box-shadow: inset 0 -3px 0 #121c26, 0 0 0 1px #4e6580;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #f0f6ff;
      transition: all 0.12s ease;
      aspect-ratio: 1 / 1;
      padding: 4px;
      text-align: center;
      line-height: 1.2;
      text-shadow: 0 2px 3px #0f1a24;
    }

    .cell-number {
      font-size: 1.4rem;
      font-weight: 800;
      opacity: 0.9;
    }

    .cell-name {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 2px;
    }

    /* 移动端适配 */
    @media (max-width: 480px) {
      .cell-number { font-size: 1.1rem; }
      .cell-name { font-size: 0.8rem; }
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      padding: 0 8px;
    }

    button {
      background: #2e4b6a;
      border: none;
      color: #eef4ff;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 12px 28px;
      border-radius: 48px;
      box-shadow: 0 6px 0 #14212e, 0 3px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: 0.08s linear;
      border: 1px solid #6082a8;
      letter-spacing: 2px;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #14212e, 0 3px 6px rgba(0,0,0,0.3);
    }

    .share-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .share-link-btn {
      background: #3d5e7a;
      box-shadow: 0 5px 0 #1a2c3b, 0 3px 8px rgba(0,0,0,0.3);
      padding: 10px 20px;
      font-size: 1rem;
    }

    .game-message {
      text-align: center;
      margin-top: 10px;
      min-height: 28px;
      font-weight: 600;
      color: #aac7f0;
      text-shadow: 0 1px 2px #0f1e2c;
    }

    /* 移动端优化 */
    @media (max-width: 480px) {
      .game-container { padding: 16px 12px 20px; }
      h1 { font-size: 2rem; }
      .grid { gap: 8px; }
      .score-box { padding: 4px 10px; min-width: 70px; }
      .score-value { font-size: 1.4rem; }
      button { padding: 10px 18px; font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <h1>🏆 406</h1>
    <div class="scores">
      <div class="score-box">
        <div class="score-label">分</div>
        <div class="score-value" id="scoreDisplay">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">最高</div>
        <div class="score-value" id="bestDisplay">0</div>
      </div>
    </div>
  </div>
  <div class="teacher-note">
    😎 2·学生 → 李娜 · 宝哥 · 俊萍 · 雯娟 · 氘氚 · 管虎 · 闫伟 · 李奋平 · 显哥 · Downs 😎
  </div>

  <div class="board-container">
    <div class="grid" id="gridContainer"></div>
  </div>

  <div class="footer">
    <button id="newGameBtn">🔄 重开一局</button>
    <div class="share-area">
      <button id="shareBtn" class="share-link-btn">🔗 甩个链接</button>
    </div>
  </div>
  <div id="messageArea" class="game-message"></div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 传奇名单 (数值→外号) ----------
    const TEACHER_NAMES = {
      2: "学生",
      4: "李娜",
      8: "宝哥",
      16: "俊萍",
      32: "雯娟",
      64: "氘氚",
      128: "管虎",
      256: "闫伟",
      512: "李奋平",
      1024: "显哥",
      2048: "Downs"
    };

    const SIZE = 4;
    let board = [];
    let score = 0;
    let bestScore = 0;
    let gameOver = false;
    let winFlag = false;   

    // DOM
    const gridEl = document.getElementById('gridContainer');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const bestDisplay = document.getElementById('bestDisplay');
    const messageEl = document.getElementById('messageArea');

    function initBoard() {
      board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
      score = 0;
      gameOver = false;
      winFlag = false;
      updateBestFromStorage();
    }

    function loadBestScore() {
      try {
        const saved = localStorage.getItem('room406_best');
        if (saved) bestScore = parseInt(saved, 10) || 0;
        else bestScore = 0;
      } catch(e) { bestScore = 0; }
      bestDisplay.textContent = bestScore;
    }

    function updateBestFromStorage() {
      if (score > bestScore) {
        bestScore = score;
        try {
          localStorage.setItem('room406_best', bestScore);
        } catch(e) {}
      }
      bestDisplay.textContent = bestScore;
    }

    function updateScoreUI() {
      scoreDisplay.textContent = score;
      updateBestFromStorage();
    }

    function getEmptyCells() {
      const empty = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] === 0) empty.push([r, c]);
        }
      }
      return empty;
    }

    function addRandomTile() {
      const empty = getEmptyCells();
      if (empty.length === 0) return false;
      const [r, c] = empty[Math.floor(Math.random() * empty.length)];
      board[r][c] = Math.random() < 0.9 ? 2 : 4;
      return true;
    }

    function startNewGame() {
      initBoard();
      addRandomTile();
      addRandomTile();
      renderBoard();
      updateScoreUI();
      messageEl.textContent = '🎮 滑动合并，召唤406众神！';
      gameOver = false;
      winFlag = false;
    }

    // 核心移动逻辑
    function move(direction) {
      if (gameOver) {
        messageEl.textContent = '🚫 游戏已结束，重开一局吧';
        return false;
      }

      let moved = false;
      let addScore = 0;

      function processLine(line) {
        let arr = line.filter(val => val !== 0);
        for (let i = 0; i < arr.length - 1; i++) {
          if (arr[i] !== 0 && arr[i] === arr[i+1]) {
            arr[i] = arr[i] * 2;
            addScore += arr[i];
            arr[i+1] = 0;
            i++;
          }
        }
        arr = arr.filter(val => val !== 0);
        while (arr.length < SIZE) arr.push(0);
        return arr;
      }

      if (direction === 'left') {
        for (let r = 0; r < SIZE; r++) {
          const oldRow = board[r];
          const newRow = processLine(oldRow);
          if (oldRow.join(',') !== newRow.join(',')) moved = true;
          board[r] = newRow;
        }
      } else if (direction === 'right') {
        for (let r = 0; r < SIZE; r++) {
          let oldRow = board[r];
          let reversed = [...oldRow].reverse();
          let processed = processLine(reversed);
          let newRow = processed.reverse();
          if (oldRow.join(',') !== newRow.join(',')) moved = true;
          board[r] = newRow;
        }
      } else if (direction === 'up') {
        for (let c = 0; c < SIZE; c++) {
          let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
          let newCol = processLine(col);
          if (col.join(',') !== newCol.join(',')) moved = true;
          for (let r = 0; r < SIZE; r++) board[r][c] = newCol[r];
        }
      } else if (direction === 'down') {
        for (let c = 0; c < SIZE; c++) {
          let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
          let reversed = [...col].reverse();
          let processed = processLine(reversed);
          let newCol = processed.reverse();
          if (col.join(',') !== newCol.join(',')) moved = true;
          for (let r = 0; r < SIZE; r++) board[r][c] = newCol[r];
        }
      }

      if (!moved) {
        if (isGameOverCondition()) {
          gameOver = true;
          messageEl.textContent = '😵 卡住了… 406今天到此为止？';
        } else {
          messageEl.textContent = '👀 换个方向滑滑看';
        }
        renderBoard();
        return false;
      }

      score += addScore;
      updateScoreUI();
      addRandomTile();
      renderBoard();

      // 检查是否达成2048 (Downs)
      if (!winFlag) {
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (board[r][c] === 2048) {
              winFlag = true;
              messageEl.textContent = '🎉 恭喜！Downs降临406！你就是传奇！ 🎉';
            }
          }
        }
      }

      if (isGameOverCondition()) {
        gameOver = true;
        messageEl.textContent = '🏁 游戏结束，406永远滴神！';
      } else {
        if (!winFlag) messageEl.textContent = '🔥 继续合成，集齐406全明星！';
        else if (winFlag && messageEl.textContent.indexOf('Downs') === -1) {
          messageEl.textContent = '👑 Downs已现，继续刷分！';
        }
      }

      renderBoard(); 
      return true;
    }

    function isGameOverCondition() {
      if (getEmptyCells().length > 0) return false;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const val = board[r][c];
          if (val === 0) continue;
          if (c < SIZE - 1 && board[r][c+1] === val) return false;
          if (r < SIZE - 1 && board[r+1][c] === val) return false;
        }
      }
      return true;
    }

    // 获取显示用的名字
    function getNameForValue(value) {
      if (value === 0) return '';
      if (value > 2048) return value.toString();
      return TEACHER_NAMES[value] || value.toString();
    }

    // 方块颜色
    function getTileColor(value) {
      const colors = {
        2: '#4a6670',
        4: '#6d597a',
        8: '#3d6b5e',
        16: '#5f6c7a',
        32: '#7c5f6b',
        64: '#b5654b',
        128: '#9e6b5e',
        256: '#4a7c7c',
        512: '#7a6b4f',
        1024: '#5b7a9a',
        2048: '#a8646e'
      };
      return colors[value] || '#4a5568';
    }

    function renderBoard() {
      gridEl.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const val = board[r][c];
          const cell = document.createElement('div');
          cell.className = 'cell';
          
          if (val === 0) {
            cell.style.backgroundColor = '#2f4055';
            cell.style.boxShadow = 'inset 0 -3px 0 #121c26';
          } else {
            const bgColor = getTileColor(val);
            cell.style.backgroundColor = bgColor;
            cell.style.boxShadow = 'inset 0 -3px 0 rgba(0,0,0,0.2), 0 2px 6px rgba(0,0,0,0.3)';
            
            const numberSpan = document.createElement('div');
            numberSpan.className = 'cell-number';
            numberSpan.textContent = val;
            
            const nameSpan = document.createElement('div');
            nameSpan.className = 'cell-name';
            nameSpan.textContent = getNameForValue(val);
            
            cell.appendChild(numberSpan);
            cell.appendChild(nameSpan);
          }
          
          cell.setAttribute('data-value', val);
          gridEl.appendChild(cell);
        }
      }
    }

    // 键盘事件
    function handleKey(e) {
      const key = e.key;
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
        e.preventDefault();
      }
      if (key === 'ArrowLeft') move('left');
      else if (key === 'ArrowRight') move('right');
      else if (key === 'ArrowUp') move('up');
      else if (key === 'ArrowDown') move('down');
    }

    // 触摸滑动
    let touchStartX = 0, touchStartY = 0;
    function handleTouchStart(e) {
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }
    function handleTouchEnd(e) {
      if (!touchStartX || !touchStartY) return;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      const absDx = Math.abs(dx), absDy = Math.abs(dy);
      if (Math.max(absDx, absDy) < 15) return;

      if (absDx > absDy) {
        if (dx > 0) move('right');
        else move('left');
      } else {
        if (dy > 0) move('down');
        else move('up');
      }
      touchStartX = 0; touchStartY = 0;
    }

    // 修复后的分享功能 - 使用更短的编码方式
    function generateShareLink() {
      try {
        // 将棋盘数据压缩成一维数组，只保存非零值的位置和数值
        const compressed = [];
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (board[r][c] !== 0) {
              compressed.push(r, c, board[r][c]);
            }
          }
        }
        
        const state = {
          b: compressed,  // 压缩后的棋盘数据
          s: score,       // 当前分数
          w: winFlag      // 是否已达成2048
        };
        
        const json = JSON.stringify(state);
        const encoded = btoa(encodeURIComponent(json)).replace(/=+$/, '');
        const url = new URL(window.location.href);
        url.searchParams.set('s', encoded);
        return url.toString();
      } catch(e) {
        return window.location.href;
      }
    }

    function restoreFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const stateStr = params.get('s');
      if (!stateStr) return false;
      
      try {
        // 补充可能缺失的等号
        let padded = stateStr;
        while (padded.length % 4) padded += '=';
        
        const json = decodeURIComponent(atob(padded));
        const state = JSON.parse(json);
        
        if (state.b && Array.isArray(state.b)) {
          // 初始化空棋盘
          board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
          
          // 根据压缩数据恢复棋盘
          const compressed = state.b;
          for (let i = 0; i < compressed.length; i += 3) {
            const r = compressed[i];
            const c = compressed[i + 1];
            const val = compressed[i + 2];
            if (r >= 0 && r < SIZE && c >= 0 && c < SIZE) {
              board[r][c] = val;
            }
          }
          
          score = state.s || 0;
          winFlag = state.w || false;
          
          updateScoreUI();
          renderBoard();
          
          // 检查游戏状态
          gameOver = isGameOverCondition();
          
          if (gameOver) {
            messageEl.textContent = '📌 这局已经结束了，重开继续肝！';
          } else if (winFlag) {
            messageEl.textContent = '🎉 Downs已在阵中！继续刷分！';
          } else {
            messageEl.textContent = '📋 加载成功，继续你的406传奇！';
          }
          
          return true;
        }
      } catch(e) {
        console.log('恢复失败:', e);
        messageEl.textContent = '⚠️ 链接无效，开始新游戏';
      }
      return false;
    }

    function shareLink() {
      const link = generateShareLink();
      navigator.clipboard?.writeText(link).then(() => {
        messageEl.textContent = '✅ 链接已复制，甩给兄弟们！';
      }).catch(() => {
        prompt('📎 复制链接，分享给406的伙伴:', link);
        messageEl.textContent = '🔗 手动复制即可分享';
      });
    }

    // 挂载事件
    window.addEventListener('keydown', handleKey);
    const boardEl = document.querySelector('.board-container');
    boardEl.addEventListener('touchstart', handleTouchStart, {passive: false});
    boardEl.addEventListener('touchend', handleTouchEnd);
    
    document.getElementById('newGameBtn').addEventListener('click', () => {
      startNewGame();
      if (window.history.replaceState) {
        const url = new URL(window.location);
        url.searchParams.delete('s');
        window.history.replaceState({}, '', url);
      }
    });

    document.getElementById('shareBtn').addEventListener('click', shareLink);

    // 初始化
    loadBestScore();
    
    // 尝试从URL恢复，如果失败则开始新游戏
    const restored = restoreFromUrl();
    if (!restored) {
      startNewGame();
    }

  })();
</script>
</body>
</html>
